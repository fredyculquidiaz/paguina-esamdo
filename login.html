<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESAM-DO | Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            min-height: 100vh;
        }
        .login-card {
            background: rgba(17,17,17,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(255,0,0,0.2);
        }
        .form-control {
            background: rgba(26,26,26,0.9);
            border: 1px solid rgba(255,0,0,0.5);
            color: white;
        }
        .form-control:focus {
            border-color: #ff0000;
            box-shadow: 0 0 0 0.25rem rgba(255,0,0,0.25);
        }
        .form-label {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="col-md-5">
            <div class="login-card">
                <div class="text-center mb-4">
                    <span class="bg-danger px-4 py-2 rounded d-inline-block fw-bold fs-3">ESAM-DO</span>
                    <h2 class="mt-3 text-white">Bienvenido</h2>
                    <p class="text-white-50">Ingresa tus credenciales</p>
                </div>
                
                <div id="alertContainer"></div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="admin@esamdo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="admin123" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2">Iniciar Sesión</button>
                </form>
                
                <hr class="my-4" style="border-color: rgba(255,0,0,0.3);">
                
                <div class="text-center">
                    <small class="text-white-50">Demo: admin@esamdo.com / admin123</small>
                </div>
                <div class="text-center mt-3">
                    <a href="register.html" class="text-danger">¿No tienes cuenta? Regístrate</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Usuarios por defecto
        const defaultUsers = [
            { id: '1', nombre: 'Administrador', email: 'admin@esamdo.com', password: 'admin123', rol: 'admin' },
            { id: '2', nombre: 'Instructor Carlos', email: 'instructor@esamdo.com', password: 'inst123', rol: 'instructor' }
        ];
        
        function initUsers() {
            if (!localStorage.getItem('users')) {
                localStorage.setItem('users', JSON.stringify(defaultUsers));
            }
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertContainer');
            alertDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
            setTimeout(() => alertDiv.innerHTML = '', 3000);
        }
        
        initUsers();
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('users'));
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                const { password, ...userWithoutPassword } = user;
                localStorage.setItem('usuario', JSON.stringify(userWithoutPassword));
                window.location.href = user.rol === 'admin' ? 'admin/dashboard.html' : 'index.html';
            } else {
                showAlert('Correo o contraseña incorrectos', 'danger');
            }
        });
    </script>
</body>
</html>
