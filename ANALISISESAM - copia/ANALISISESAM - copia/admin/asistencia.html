<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - ESAM-DO Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .table-asistencia {
            background: rgba(17,17,17,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }
        .table-asistencia thead {
            background: #ff0000;
            color: white;
        }
        .badge-presente {
            background: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .badge-tarde {
            background: #ffc107;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .badge-falta {
            background: #ff0000;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .asistencia-card {
            background: rgba(17,17,17,0.9);
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .asistencia-card h2 {
            color: #ff0000;
            font-size: 2.5rem;
        }
    </style>
</head>
<body>

<div class="wave-overlay"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 px-0 sidebar">
            <div class="text-center py-4">
                <i class="fas fa-fist-raised fa-3x text-danger"></i>
                <h5 class="mt-2 text-white">ESAM-DO</h5>
                <small class="text-white-50">Panel Admin</small>
            </div>
            <nav class="nav flex-column px-3">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a class="nav-link" href="estudiantes.html"><i class="fas fa-users"></i> Estudiantes</a>
                <a class="nav-link" href="pagos.html"><i class="fas fa-dollar-sign"></i> Pagos</a>
                <a class="nav-link active" href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
                <a class="nav-link" href="inventario.html"><i class="fas fa-boxes"></i> Inventario</a>
                <a class="nav-link" href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a>
            </nav>
            <div class="position-absolute bottom-0 w-100 p-3">
                <button onclick="cerrarSesion()" class="btn btn-outline-danger w-100">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 ms-sm-auto px-4 py-3">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="text-white"><i class="fas fa-calendar-check text-danger"></i> Control de Asistencia</h1>
                <div>
                    <input type="date" id="fechaAsistencia" class="form-control d-inline-block w-auto" style="background: #1a1a1a; border-color: #ff0000; color: white;">
                </div>
            </div>
            
            <div id="alertContainer"></div>
            
            <!-- Tarjetas de resumen -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="asistencia-card">
                        <i class="fas fa-users fa-2x text-danger"></i>
                        <h2 id="totalEstudiantesHoy">0</h2>
                        <p class="text-white-50">Total Estudiantes</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="asistencia-card">
                        <i class="fas fa-check-circle fa-2x text-success"></i>
                        <h2 id="presentesHoy">0</h2>
                        <p class="text-white-50">Presentes</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="asistencia-card">
                        <i class="fas fa-clock fa-2x text-warning"></i>
                        <h2 id="tardeHoy">0</h2>
                        <p class="text-white-50">Tarde</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="asistencia-card">
                        <i class="fas fa-times-circle fa-2x text-danger"></i>
                        <h2 id="faltasHoy">0</h2>
                        <p class="text-white-50">Faltas</p>
                    </div>
                </div>
            </div>
            
            <!-- Tabla de asistencia -->
            <div class="table-responsive">
                <table class="table table-asistencia text-white">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Estudiante</th>
                            <th>Nivel</th>
                            <th>Estado</th>
                            <th>Hora</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="asistenciaBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/navbar.js"></script>
<script>
    // Verificar admin
    const usuario = localStorage.getItem('usuario');
    const user = usuario ? JSON.parse(usuario) : null;
    if (!user || user.rol !== 'admin') {
        alert('Acceso denegado. Se requieren permisos de administrador.');
        window.location.href = '../login.html';
    }
    
    // ============================================
    // DATOS INICIALES
    // ============================================
    
    function initAsistenciaData() {
        if (!localStorage.getItem('asistencia')) {
            localStorage.setItem('asistencia', JSON.stringify([]));
        }
    }
    
    function getAsistencia() {
        return JSON.parse(localStorage.getItem('asistencia') || '[]');
    }
    
    function saveAsistencia(asistencia) {
        localStorage.setItem('asistencia', JSON.stringify(asistencia));
    }
    
    function getEstudiantes() {
        return JSON.parse(localStorage.getItem('estudiantes') || '[]');
    }
    
    // ============================================
    // CARGAR ASISTENCIA
    // ============================================
    
    let fechaActual = new Date().toISOString().split('T')[0];
    
    function cargarAsistencia() {
        const estudiantes = getEstudiantes();
        const asistencia = getAsistencia();
        
        const estudiantesActivos = estudiantes.filter(e => e.estado === 'activo');
        
        const tbody = document.getElementById('asistenciaBody');
        tbody.innerHTML = estudiantesActivos.map(est => {
            const registro = asistencia.find(a => a.estudianteId === est.id && a.fecha === fechaActual);
            const estado = registro ? registro.estado : 'pendiente';
            const hora = registro ? registro.hora : '—';
            
            let badgeClass = '';
            let estadoText = '';
            
            if (estado === 'presente') {
                badgeClass = 'badge-presente';
                estadoText = 'Presente';
            } else if (estado === 'tarde') {
                badgeClass = 'badge-tarde';
                estadoText = 'Tarde';
            } else if (estado === 'falta') {
                badgeClass = 'badge-falta';
                estadoText = 'Falta';
            } else {
                badgeClass = 'badge-pendiente';
                estadoText = 'Pendiente';
            }
            
            return `
                <tr>
                    <td>${est.codigo}</td>
                    <td>${est.nombres} ${est.apellidos}</td>
                    <td><span class="badge bg-secondary">${getNombreNivel(est.nivel)}</span></td>
                    <td><span class="${badgeClass}">${estadoText}</span></td>
                    <td>${hora}</td>
                    <td>
                        <button class="btn btn-sm btn-success me-1" onclick="marcarAsistencia('${est.id}', 'presente')"><i class="fas fa-check"></i> Presente</button>
                        <button class="btn btn-sm btn-warning me-1" onclick="marcarAsistencia('${est.id}', 'tarde')"><i class="fas fa-clock"></i> Tarde</button>
                        <button class="btn btn-sm btn-danger" onclick="marcarAsistencia('${est.id}', 'falta')"><i class="fas fa-times"></i> Falta</button>
                    </td>
                </tr>
            `;
        }).join('');
        
        // Actualizar resumen
        const registrosHoy = asistencia.filter(a => a.fecha === fechaActual);
        const presentes = registrosHoy.filter(a => a.estado === 'presente').length;
        const tardes = registrosHoy.filter(a => a.estado === 'tarde').length;
        const faltas = registrosHoy.filter(a => a.estado === 'falta').length;
        
        document.getElementById('totalEstudiantesHoy').innerText = estudiantesActivos.length;
        document.getElementById('presentesHoy').innerText = presentes;
        document.getElementById('tardeHoy').innerText = tardes;
        document.getElementById('faltasHoy').innerText = faltas;
    }
    
    function getNombreNivel(nivel) {
        const niveles = {
            'blanco': 'Blanco', 'amarillo': 'Amarillo', 'naranja': 'Naranja',
            'verde': 'Verde', 'azul': 'Azul', 'marrón': 'Marrón', 'negro': 'Negro'
        };
        return niveles[nivel] || nivel;
    }
    
    function marcarAsistencia(estudianteId, estado) {
        let asistencia = getAsistencia();
        const index = asistencia.findIndex(a => a.estudianteId === estudianteId && a.fecha === fechaActual);
        
        const registro = {
            estudianteId: estudianteId,
            fecha: fechaActual,
            estado: estado,
            hora: new Date().toLocaleTimeString()
        };
        
        if (index !== -1) {
            asistencia[index] = registro;
        } else {
            asistencia.push(registro);
        }
        
        saveAsistencia(asistencia);
        mostrarAlerta(`Asistencia marcada como ${estado}`, 'success');
        cargarAsistencia();
    }
    
    function mostrarAlerta(mensaje, tipo) {
        const alertDiv = document.getElementById('alertContainer');
        alertDiv.innerHTML = `<div class="alert alert-${tipo === 'success' ? 'success' : 'danger'} alert-dismissible fade show">${mensaje}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        setTimeout(() => alertDiv.innerHTML = '', 3000);
    }
    
    function cerrarSesion() {
        localStorage.removeItem('usuario');
        window.location.href = '../login.html';
    }
    
    // Cambiar fecha
    document.getElementById('fechaAsistencia').addEventListener('change', function(e) {
        fechaActual = e.target.value;
        cargarAsistencia();
    });
    
    // Inicializar
    initAsistenciaData();
    document.getElementById('fechaAsistencia').value = fechaActual;
    cargarAsistencia();
</script>
</body>
</html>
