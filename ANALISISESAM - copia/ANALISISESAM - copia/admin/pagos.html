<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos - ESAM-DO Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .table-pagos {
            background: rgba(17,17,17,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }
        .table-pagos thead {
            background: #ff0000;
            color: white;
        }
        .badge-pagado {
            background: #28a745;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .badge-pendiente {
            background: #ffc107;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
        }
        .total-card {
            background: linear-gradient(135deg, #000000, #1a1a1a);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .total-card h3 {
            color: #ff0000;
            font-size: 2rem;
        }
    </style>
</head>
<body>

<div class="wave-overlay"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 px-0 sidebar">
            <div class="text-center py-4">
                <i class="fas fa-fist-raised fa-3x text-danger"></i>
                <h5 class="mt-2 text-white">ESAM-DO</h5>
                <small class="text-white-50">Panel Admin</small>
            </div>
            <nav class="nav flex-column px-3">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a class="nav-link" href="estudiantes.html"><i class="fas fa-users"></i> Estudiantes</a>
                <a class="nav-link active" href="pagos.html"><i class="fas fa-dollar-sign"></i> Pagos</a>
                <a class="nav-link" href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
                <a class="nav-link" href="inventario.html"><i class="fas fa-boxes"></i> Inventario</a>
                <a class="nav-link" href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a>
            </nav>
            <div class="position-absolute bottom-0 w-100 p-3">
                <button onclick="cerrarSesion()" class="btn btn-outline-danger w-100">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 ms-sm-auto px-4 py-3">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="text-white"><i class="fas fa-dollar-sign text-danger"></i> Gestión de Pagos</h1>
                <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalPago" onclick="resetFormPago()">
                    <i class="fas fa-plus"></i> Registrar Pago
                </button>
            </div>
            
            <div id="alertContainer"></div>
            
            <!-- Tarjetas de totales -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="total-card">
                        <i class="fas fa-chart-line fa-2x text-danger"></i>
                        <h3 id="totalIngresos">S/ 0</h3>
                        <p class="text-white-50">Ingresos Totales</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="total-card">
                        <i class="fas fa-calendar-month fa-2x text-danger"></i>
                        <h3 id="ingresosMes">S/ 0</h3>
                        <p class="text-white-50">Ingresos del Mes</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="total-card">
                        <i class="fas fa-clock fa-2x text-danger"></i>
                        <h3 id="pagosPendientes">0</h3>
                        <p class="text-white-50">Pagos Pendientes</p>
                    </div>
                </div>
            </div>
            
            <!-- Buscador y filtros -->
            <div class="card bg-dark mb-4" style="border: 1px solid rgba(255,0,0,0.3);">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <input type="text" id="searchInput" class="form-control" placeholder="Buscar estudiante...">
                        </div>
                        <div class="col-md-2">
                            <select id="filtroEstado" class="form-select">
                                <option value="todos">Todos los estados</option>
                                <option value="pagado">Pagado</option>
                                <option value="pendiente">Pendiente</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select id="filtroConcepto" class="form-select">
                                <option value="todos">Todos los conceptos</option>
                                <option value="mensualidad">Mensualidad</option>
                                <option value="matricula">Matrícula</option>
                                <option value="examen">Examen de cinta</option>
                                <option value="producto">Producto</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <select id="filtroMes" class="form-select">
                                <option value="0">Todos los meses</option>
                                <option value="1">Enero</option>
                                <option value="2">Febrero</option>
                                <option value="3">Marzo</option>
                                <option value="4">Abril</option>
                                <option value="5">Mayo</option>
                                <option value="6">Junio</option>
                                <option value="7">Julio</option>
                                <option value="8">Agosto</option>
                                <option value="9">Septiembre</option>
                                <option value="10">Octubre</option>
                                <option value="11">Noviembre</option>
                                <option value="12">Diciembre</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-danger w-100" onclick="filtrarPagos()">Filtrar</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Tabla de pagos -->
            <div class="table-responsive">
                <table class="table table-pagos text-white">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Estudiante</th>
                            <th>Concepto</th>
                            <th>Descripción</th>
                            <th>Monto</th>
                            <th>Mes/Año</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="pagosBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Registrar/Editar Pago -->
<div class="modal fade" id="modalPago" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="background: #111; border: 1px solid #ff0000;">
            <div class="modal-header" style="background: #ff0000;">
                <h5 class="modal-title text-white" id="modalTitlePago">Registrar Pago</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="pagoForm">
                <input type="hidden" id="pagoId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-danger">Estudiante *</label>
                        <select id="estudianteId" class="form-select" required>
                            <option value="">Seleccione estudiante...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-danger">Concepto *</label>
                        <select id="concepto" class="form-select" required onchange="actualizarDescripcionPorDefecto()">
                            <option value="mensualidad">📘 Mensualidad</option>
                            <option value="matricula">📝 Matrícula</option>
                            <option value="examen">🥋 Examen de cinta</option>
                            <option value="producto">🛒 Producto</option>
                            <option value="uniforme">👕 Uniforme</option>
                            <option value="otro">📌 Otro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-danger">Descripción / Detalle *</label>
                        <textarea id="descripcion" class="form-control" rows="2" placeholder="Ej: Pago de mensualidad Marzo 2026 - Juan Pérez" required></textarea>
                        <small class="text-white-50">Describe detalladamente el motivo del pago</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-danger">Monto (S/) *</label>
                        <input type="number" id="monto" class="form-control" step="0.01" required>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-danger">Día</label>
                            <input type="date" id="fechaPago" class="form-control" value="">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-danger">Mes</label>
                            <select id="mes" class="form-select">
                                <option value="1">Enero</option>
                                <option value="2">Febrero</option>
                                <option value="3">Marzo</option>
                                <option value="4">Abril</option>
                                <option value="5">Mayo</option>
                                <option value="6">Junio</option>
                                <option value="7">Julio</option>
                                <option value="8">Agosto</option>
                                <option value="9">Septiembre</option>
                                <option value="10">Octubre</option>
                                <option value="11">Noviembre</option>
                                <option value="12">Diciembre</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label text-danger">Año</label>
                            <input type="number" id="anio" class="form-control" value="2026">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-danger">Estado</label>
                        <select id="estadoPago" class="form-select">
                            <option value="pagado">✅ Pagado</option>
                            <option value="pendiente">⏳ Pendiente</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger">Guardar Pago</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Verificar admin
    const usuario = localStorage.getItem('usuario');
    const user = usuario ? JSON.parse(usuario) : null;
    if (!user || user.rol !== 'admin') {
        alert('Acceso denegado. Se requieren permisos de administrador.');
        window.location.href = '../login.html';
    }
    
    // ============================================
    // DATOS INICIALES
    // ============================================
    
    function initPagosData() {
        if (!localStorage.getItem('pagos')) {
            const hoy = new Date().toISOString().split('T')[0];
            const pagosIniciales = [
                { id: '1', estudianteId: '1', estudianteNombre: 'Juan Pérez', concepto: 'mensualidad', descripcion: 'Pago de mensualidad - Enero 2026', monto: 120, mes: 1, anio: 2026, fecha: '2026-01-10', estado: 'pagado' },
                { id: '2', estudianteId: '2', estudianteNombre: 'María López', concepto: 'matricula', descripcion: 'Matrícula semestre 2026-I', monto: 150, mes: 1, anio: 2026, fecha: '2026-01-15', estado: 'pagado' },
                { id: '3', estudianteId: '3', estudianteNombre: 'Carlos Mendoza', concepto: 'examen', descripcion: 'Examen de cinta verde a azul', monto: 80, mes: 2, anio: 2026, fecha: '2026-02-05', estado: 'pagado' },
                { id: '4', estudianteId: '1', estudianteNombre: 'Juan Pérez', concepto: 'producto', descripcion: 'Compra de Karategui Adulto talla M', monto: 150, mes: 2, anio: 2026, fecha: '2026-02-20', estado: 'pagado' }
            ];
            localStorage.setItem('pagos', JSON.stringify(pagosIniciales));
        }
    }
    
    function getPagos() {
        return JSON.parse(localStorage.getItem('pagos') || '[]');
    }
    
    function savePagos(pagos) {
        localStorage.setItem('pagos', JSON.stringify(pagos));
    }
    
    function getEstudiantes() {
        return JSON.parse(localStorage.getItem('estudiantes') || '[]');
    }
    
    function generarId() {
        return Date.now().toString();
    }
    
    function actualizarDescripcionPorDefecto() {
        const concepto = document.getElementById('concepto').value;
        const estudianteId = document.getElementById('estudianteId').value;
        const estudiantes = getEstudiantes();
        const estudiante = estudiantes.find(e => e.id === estudianteId);
        const nombreEstudiante = estudiante ? `${estudiante.nombres} ${estudiante.apellidos}` : '';
        const mesActual = new Date().getMonth() + 1;
        const anioActual = new Date().getFullYear();
        
        let descripcionDefecto = '';
        switch(concepto) {
            case 'mensualidad':
                descripcionDefecto = `Pago de mensualidad - ${getNombreMes(mesActual)} ${anioActual} - ${nombreEstudiante}`;
                break;
            case 'matricula':
                descripcionDefecto = `Matrícula semestre ${anioActual} - ${nombreEstudiante}`;
                break;
            case 'examen':
                descripcionDefecto = `Examen de cambio de cinta - ${nombreEstudiante}`;
                break;
            case 'producto':
                descripcionDefecto = `Compra de producto deportivo - ${nombreEstudiante}`;
                break;
            case 'uniforme':
                descripcionDefecto = `Compra de uniforme - ${nombreEstudiante}`;
                break;
            default:
                descripcionDefecto = `Pago realizado por ${nombreEstudiante}`;
        }
        
        document.getElementById('descripcion').value = descripcionDefecto;
    }
    
    function getNombreMes(mes) {
        const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        return meses[mes - 1];
    }
    
    // ============================================
    // CARGAR DATOS EN TABLA
    // ============================================
    
    let filtroActual = { search: '', estado: 'todos', concepto: 'todos', mes: 0 };
    
    function cargarPagos() {
        let pagos = getPagos();
        const estudiantes = getEstudiantes();
        
        // Unir nombres de estudiantes
        pagos = pagos.map(pago => {
            const estudiante = estudiantes.find(e => e.id === pago.estudianteId);
            return { ...pago, estudianteNombre: estudiante ? `${estudiante.nombres} ${estudiante.apellidos}` : pago.estudianteNombre || 'Desconocido' };
        });
        
        // Aplicar filtros
        let filtrados = pagos;
        
        if (filtroActual.search) {
            filtrados = filtrados.filter(p => p.estudianteNombre.toLowerCase().includes(filtroActual.search));
        }
        
        if (filtroActual.estado !== 'todos') {
            filtrados = filtrados.filter(p => p.estado === filtroActual.estado);
        }
        
        if (filtroActual.concepto !== 'todos') {
            filtrados = filtrados.filter(p => p.concepto === filtroActual.concepto);
        }
        
        if (filtroActual.mes !== 0) {
            filtrados = filtrados.filter(p => p.mes === parseInt(filtroActual.mes));
        }
        
        // Ordenar por fecha descendente
        filtrados.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        
        // Mostrar en tabla
        const tbody = document.getElementById('pagosBody');
        tbody.innerHTML = filtrados.map(p => {
            let conceptoIcono = '';
            switch(p.concepto) {
                case 'mensualidad': conceptoIcono = '📘'; break;
                case 'matricula': conceptoIcono = '📝'; break;
                case 'examen': conceptoIcono = '🥋'; break;
                default: conceptoIcono = '🛒';
            }
            return `
                <tr>
                    <td>${p.fecha || '—'}</td>
                    <td>${p.estudianteNombre}</td>
                    <td>${conceptoIcono} ${p.concepto === 'mensualidad' ? 'Mensualidad' : p.concepto === 'matricula' ? 'Matrícula' : p.concepto === 'examen' ? 'Examen' : 'Producto'}</td>
                    <td><small>${p.descripcion || 'Sin descripción'}</small></td>
                    <td class="text-danger fw-bold">S/ ${p.monto}</td>
                    <td>${getNombreMes(p.mes)} ${p.anio}</td>
                    <td><span class="badge-${p.estado === 'pagado' ? 'pagado' : 'pendiente'}">${p.estado === 'pagado' ? 'Pagado' : 'Pendiente'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarPago('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarPago('${p.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
        
        // Actualizar totales
        actualizarTotales(pagos);
    }
    
    function actualizarTotales(pagos) {
        const totalIngresos = pagos.filter(p => p.estado === 'pagado').reduce((sum, p) => sum + p.monto, 0);
        const mesActual = new Date().getMonth() + 1;
        const ingresosMes = pagos.filter(p => p.estado === 'pagado' && p.mes === mesActual).reduce((sum, p) => sum + p.monto, 0);
        const pagosPendientes = pagos.filter(p => p.estado === 'pendiente').length;
        
        document.getElementById('totalIngresos').innerHTML = `S/ ${totalIngresos}`;
        document.getElementById('ingresosMes').innerHTML = `S/ ${ingresosMes}`;
        document.getElementById('pagosPendientes').innerHTML = pagosPendientes;
    }
    
    function filtrarPagos() {
        filtroActual.search = document.getElementById('searchInput').value.toLowerCase();
        filtroActual.estado = document.getElementById('filtroEstado').value;
        filtroActual.concepto = document.getElementById('filtroConcepto').value;
        filtroActual.mes = document.getElementById('filtroMes').value;
        cargarPagos();
    }
    
    // ============================================
    // CRUD PAGOS
    // ============================================
    
    function cargarSelectEstudiantes() {
        const estudiantes = getEstudiantes();
        const select = document.getElementById('estudianteId');
        select.innerHTML = '<option value="">Seleccione estudiante...</option>' + 
            estudiantes.map(e => `<option value="${e.id}">${e.nombres} ${e.apellidos} (${e.codigo})</option>`).join('');
    }
    
    function resetFormPago() {
        document.getElementById('pagoId').value = '';
        document.getElementById('pagoForm').reset();
        document.getElementById('modalTitlePago').innerText = 'Registrar Pago';
        document.getElementById('anio').value = 2026;
        document.getElementById('fechaPago').value = new Date().toISOString().split('T')[0];
        cargarSelectEstudiantes();
    }
    
    function editarPago(id) {
        const pagos = getPagos();
        const pago = pagos.find(p => p.id === id);
        if (pago) {
            document.getElementById('pagoId').value = pago.id;
            document.getElementById('estudianteId').value = pago.estudianteId;
            document.getElementById('concepto').value = pago.concepto;
            document.getElementById('descripcion').value = pago.descripcion || '';
            document.getElementById('monto').value = pago.monto;
            document.getElementById('mes').value = pago.mes;
            document.getElementById('anio').value = pago.anio;
            document.getElementById('fechaPago').value = pago.fecha || new Date().toISOString().split('T')[0];
            document.getElementById('estadoPago').value = pago.estado;
            document.getElementById('modalTitlePago').innerText = 'Editar Pago';
            new bootstrap.Modal(document.getElementById('modalPago')).show();
        }
    }
    
    function eliminarPago(id) {
        if (confirm('¿Eliminar este pago?')) {
            let pagos = getPagos();
            pagos = pagos.filter(p => p.id !== id);
            savePagos(pagos);
            mostrarAlerta('Pago eliminado correctamente', 'success');
            cargarPagos();
        }
    }
    
    document.getElementById('pagoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const id = document.getElementById('pagoId').value;
        const estudianteId = document.getElementById('estudianteId').value;
        const estudiantes = getEstudiantes();
        const estudiante = estudiantes.find(e => e.id === estudianteId);
        
        if (!estudianteId) {
            mostrarAlerta('Seleccione un estudiante', 'danger');
            return;
        }
        
        const pagoData = {
            estudianteId: estudianteId,
            estudianteNombre: estudiante ? `${estudiante.nombres} ${estudiante.apellidos}` : '',
            concepto: document.getElementById('concepto').value,
            descripcion: document.getElementById('descripcion').value,
            monto: parseFloat(document.getElementById('monto').value),
            mes: parseInt(document.getElementById('mes').value),
            anio: parseInt(document.getElementById('anio').value),
            fecha: document.getElementById('fechaPago').value || new Date().toISOString().split('T')[0],
            estado: document.getElementById('estadoPago').value
        };
        
        let pagos = getPagos();
        
        if (id) {
            const index = pagos.findIndex(p => p.id === id);
            if (index !== -1) {
                pagos[index] = { ...pagos[index], ...pagoData };
                savePagos(pagos);
                mostrarAlerta('Pago actualizado', 'success');
            }
        } else {
            pagoData.id = generarId();
            pagos.push(pagoData);
            savePagos(pagos);
            mostrarAlerta('Pago registrado', 'success');
        }
        
        bootstrap.Modal.getInstance(document.getElementById('modalPago')).hide();
        cargarPagos();
        resetFormPago();
    });
    
    function mostrarAlerta(mensaje, tipo) {
        const alertDiv = document.getElementById('alertContainer');
        alertDiv.innerHTML = `<div class="alert alert-${tipo === 'success' ? 'success' : 'danger'} alert-dismissible fade show">${mensaje}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        setTimeout(() => alertDiv.innerHTML = '', 3000);
    }
    
    function cerrarSesion() {
        localStorage.removeItem('usuario');
        window.location.href = '../login.html';
    }
    
    // Inicializar
    initPagosData();
    cargarSelectEstudiantes();
    cargarPagos();
    
    document.getElementById('searchInput').addEventListener('keyup', filtrarPagos);
    document.getElementById('estudianteId').addEventListener('change', actualizarDescripcionPorDefecto);
    document.getElementById('concepto').addEventListener('change', actualizarDescripcionPorDefecto);
</script>
</body>
</html>
