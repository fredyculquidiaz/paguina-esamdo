<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - ESAM-DO Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .table-inventario {
            background: rgba(17,17,17,0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }
        .table-inventario thead {
            background: #ff0000;
            color: white;
        }
        .stock-bajo {
            color: #ffc107;
            font-weight: bold;
        }
        .stock-critico {
            color: #ff0000;
            font-weight: bold;
        }
        .product-card {
            background: rgba(17,17,17,0.9);
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 15px;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ff0000;
        }
    </style>
</head>
<body>

<div class="wave-overlay"></div>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-3 col-lg-2 px-0 sidebar">
            <div class="text-center py-4">
                <i class="fas fa-fist-raised fa-3x text-danger"></i>
                <h5 class="mt-2 text-white">ESAM-DO</h5>
                <small class="text-white-50">Panel Admin</small>
            </div>
            <nav class="nav flex-column px-3">
                <a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a class="nav-link" href="estudiantes.html"><i class="fas fa-users"></i> Estudiantes</a>
                <a class="nav-link" href="pagos.html"><i class="fas fa-dollar-sign"></i> Pagos</a>
                <a class="nav-link" href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
                <a class="nav-link active" href="inventario.html"><i class="fas fa-boxes"></i> Inventario</a>
                <a class="nav-link" href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a>
            </nav>
            <div class="position-absolute bottom-0 w-100 p-3">
                <button onclick="cerrarSesion()" class="btn btn-outline-danger w-100">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="col-md-9 col-lg-10 ms-sm-auto px-4 py-3">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="text-white"><i class="fas fa-boxes text-danger"></i> Inventario de Productos</h1>
                <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="resetFormProducto()">
                    <i class="fas fa-plus"></i> Agregar Producto
                </button>
            </div>
            
            <div id="alertContainer"></div>
            
            <!-- Tarjetas de resumen -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="product-card p-3">
                        <i class="fas fa-boxes fa-2x text-danger"></i>
                        <h2 id="totalProductos" class="text-white">0</h2>
                        <p class="text-white-50">Productos Registrados</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="product-card p-3">
                        <i class="fas fa-exclamation-triangle fa-2x text-warning"></i>
                        <h2 id="stockBajo" class="text-white">0</h2>
                        <p class="text-white-50">Productos con Stock Bajo</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="product-card p-3">
                        <i class="fas fa-chart-line fa-2x text-success"></i>
                        <h2 id="valorInventario" class="text-white">S/ 0</h2>
                        <p class="text-white-50">Valor del Inventario</p>
                    </div>
                </div>
            </div>
            
            <!-- Buscador -->
            <div class="card bg-dark mb-4" style="border: 1px solid rgba(255,0,0,0.3);">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-9">
                            <input type="text" id="searchInput" class="form-control" placeholder="Buscar producto...">
                        </div>
                        <div class="col-md-3">
                            <button class="btn btn-danger w-100" onclick="filtrarProductos()">Buscar</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Tabla de inventario -->
            <div class="table-responsive">
                <table class="table table-inventario text-white">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Categoría</th>
                            <th>Stock</th>
                            <th>Precio Compra</th>
                            <th>Precio Venta</th>
                            <th>Ganancia</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventarioBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Producto -->
<div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: #111; border: 1px solid #ff0000;">
            <div class="modal-header" style="background: #ff0000;">
                <h5 class="modal-title text-white" id="modalTitleProducto">Agregar Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="productoForm">
                <input type="hidden" id="productoId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-danger">Producto *</label>
                        <input type="text" id="productoNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-danger">Categoría</label>
                        <select id="categoria" class="form-select">
                            <option value="Uniforme">Uniforme</option>
                            <option value="Equipo">Equipo</option>
                            <option value="Accesorio">Accesorio</option>
                            <option value="Suplemento">Suplemento</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-danger">Stock</label>
                            <input type="number" id="stock" class="form-control" value="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-danger">Precio Compra (S/)</label>
                            <input type="number" id="precioCompra" class="form-control" step="0.01" value="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-danger">Precio Venta (S/)</label>
                            <input type="number" id="precioVenta" class="form-control" step="0.01" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-danger">Proveedor</label>
                            <input type="text" id="proveedor" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/navbar.js"></script>
<script>
    // Verificar admin
    const usuario = localStorage.getItem('usuario');
    const user = usuario ? JSON.parse(usuario) : null;
    if (!user || user.rol !== 'admin') {
        alert('Acceso denegado. Se requieren permisos de administrador.');
        window.location.href = '../login.html';
    }
    
    // ============================================
    // DATOS INICIALES
    // ============================================
    
    function initInventarioData() {
        if (!localStorage.getItem('inventario')) {
            const inventarioInicial = [
                { id: '1', producto: 'Karategui Junior', categoria: 'Uniforme', stock: 20, precioCompra: 80, precioVenta: 120, proveedor: 'Jundo Importaciones' },
                { id: '2', producto: 'Karategui Adulto', categoria: 'Uniforme', stock: 15, precioCompra: 100, precioVenta: 150, proveedor: 'Jundo Importaciones' },
                { id: '3', producto: 'Guantes de Boxeo', categoria: 'Equipo', stock: 30, precioCompra: 50, precioVenta: 80, proveedor: 'Fight Store' },
                { id: '4', producto: 'Espinilleras', categoria: 'Equipo', stock: 25, precioCompra: 40, precioVenta: 60, proveedor: 'Fight Store' },
                { id: '5', producto: 'Cinturón Blanco', categoria: 'Accesorio', stock: 50, precioCompra: 10, precioVenta: 15, proveedor: 'Jundo Importaciones' },
                { id: '6', producto: 'Cinturón Negro', categoria: 'Accesorio', stock: 10, precioCompra: 18, precioVenta: 25, proveedor: 'Jundo Importaciones' },
                { id: '7', producto: 'Bebida Energética', categoria: 'Suplemento', stock: 100, precioCompra: 3, precioVenta: 5, proveedor: 'NutriSport' }
            ];
            localStorage.setItem('inventario', JSON.stringify(inventarioInicial));
        }
    }
    
    function getInventario() {
        return JSON.parse(localStorage.getItem('inventario') || '[]');
    }
    
    function saveInventario(inventario) {
        localStorage.setItem('inventario', JSON.stringify(inventario));
    }
    
    function generarId() {
        return Date.now().toString();
    }
    
    // ============================================
    // CARGAR INVENTARIO
    // ============================================
    
    let filtroInventario = '';
    
    function cargarInventario() {
        let inventario = getInventario();
        
        if (filtroInventario) {
            inventario = inventario.filter(p => p.producto.toLowerCase().includes(filtroInventario));
        }
        
        const tbody = document.getElementById('inventarioBody');
        tbody.innerHTML = inventario.map(p => {
            let stockClass = '';
            let stockText = p.stock;
            
            if (p.stock <= 5) {
                stockClass = 'stock-critico';
                stockText = `⚠️ ${p.stock} (CRÍTICO)`;
            } else if (p.stock <= 15) {
                stockClass = 'stock-bajo';
                stockText = `⚠️ ${p.stock} (BAJO)`;
            }
            
            const ganancia = p.precioVenta - p.precioCompra;
            const gananciaPorcentaje = ((ganancia / p.precioCompra) * 100).toFixed(0);
            
            return `
                <tr>
                    <td>${p.producto}</td>
                    <td>${p.categoria}</td>
                    <td><span class="${stockClass}">${stockText}</span></td>
                    <td>S/ ${p.precioCompra}</td>
                    <td class="text-danger fw-bold">S/ ${p.precioVenta}</td>
                    <td><span class="text-success">+${gananciaPorcentaje}%</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning me-1" onclick="editarProducto('${p.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarProducto('${p.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
        
        // Actualizar resumen
        const totalProductos = inventario.length;
        const stockBajo = inventario.filter(p => p.stock <= 15).length;
        const valorInventario = inventario.reduce((sum, p) => sum + (p.stock * p.precioCompra), 0);
        
        document.getElementById('totalProductos').innerText = totalProductos;
        document.getElementById('stockBajo').innerText = stockBajo;
        document.getElementById('valorInventario').innerHTML = `S/ ${valorInventario}`;
    }
    
    function filtrarProductos() {
        filtroInventario = document.getElementById('searchInput').value.toLowerCase();
        cargarInventario();
    }
    
    // ============================================
    // CRUD
    // ============================================
    
    function resetFormProducto() {
        document.getElementById('productoId').value = '';
        document.getElementById('productoForm').reset();
        document.getElementById('modalTitleProducto').innerText = 'Agregar Producto';
    }
    
    function editarProducto(id) {
        const inventario = getInventario();
        const producto = inventario.find(p => p.id === id);
        if (producto) {
            document.getElementById('productoId').value = producto.id;
            document.getElementById('productoNombre').value = producto.producto;
            document.getElementById('categoria').value = producto.categoria;
            document.getElementById('stock').value = producto.stock;
            document.getElementById('precioCompra').value = producto.precioCompra;
            document.getElementById('precioVenta').value = producto.precioVenta;
            document.getElementById('proveedor').value = producto.proveedor || '';
            document.getElementById('modalTitleProducto').innerText = 'Editar Producto';
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }
    }
    
    function eliminarProducto(id) {
        if (confirm('¿Eliminar este producto?')) {
            let inventario = getInventario();
            inventario = inventario.filter(p => p.id !== id);
            saveInventario(inventario);
            mostrarAlerta('Producto eliminado', 'success');
            cargarInventario();
        }
    }
    
    document.getElementById('productoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const id = document.getElementById('productoId').value;
        const productoData = {
            producto: document.getElementById('productoNombre').value,
            categoria: document.getElementById('categoria').value,
            stock: parseInt(document.getElementById('stock').value),
            precioCompra: parseFloat(document.getElementById('precioCompra').value),
            precioVenta: parseFloat(document.getElementById('precioVenta').value),
            proveedor: document.getElementById('proveedor').value
        };
        
        let inventario = getInventario();
        
        if (id) {
            const index = inventario.findIndex(p => p.id === id);
            if (index !== -1) {
                inventario[index] = { ...inventario[index], ...productoData };
                saveInventario(inventario);
                mostrarAlerta('Producto actualizado', 'success');
            }
        } else {
            productoData.id = generarId();
            inventario.push(productoData);
            saveInventario(inventario);
            mostrarAlerta('Producto agregado', 'success');
        }
        
        bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
        cargarInventario();
        resetFormProducto();
    });
    
    function mostrarAlerta(mensaje, tipo) {
        const alertDiv = document.getElementById('alertContainer');
        alertDiv.innerHTML = `<div class="alert alert-${tipo === 'success' ? 'success' : 'danger'} alert-dismissible fade show">${mensaje}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
        setTimeout(() => alertDiv.innerHTML = '', 3000);
    }
    
    function cerrarSesion() {
        localStorage.removeItem('usuario');
        window.location.href = '../login.html';
    }
    
    // Inicializar
    initInventarioData();
    cargarInventario();
    
    document.getElementById('searchInput').addEventListener('keyup', filtrarProductos);
</script>
</body>
</html>
