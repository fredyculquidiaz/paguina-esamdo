<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudiantes - ESAM-DO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <div class="text-center py-4">
                    <i class="fas fa-fist-raised fa-3x text-danger"></i>
                    <h5 class="mt-2">ESAM-DO</h5>
                    <small>Panel Admin</small>
                </div>
                <nav class="nav flex-column px-3">
                    <a class="nav-link" href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link active" href="estudiantes.html"><i class="fas fa-users"></i> Estudiantes</a>
                    <a class="nav-link" href="pagos.html"><i class="fas fa-dollar-sign"></i> Pagos</a>
                    <a class="nav-link" href="asistencia.html"><i class="fas fa-calendar-check"></i> Asistencia</a>
                    <a class="nav-link" href="inventario.html"><i class="fas fa-boxes"></i> Inventario</a>
                    <a class="nav-link" href="reportes.html"><i class="fas fa-chart-bar"></i> Reportes</a>
                </nav>
                <div class="position-absolute bottom-0 w-100 p-3">
                    <button onclick="logout()" class="btn btn-outline-danger w-100">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 ms-sm-auto px-4 py-3">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-users"></i> Gestión de Estudiantes</h1>
                    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalEstudiante" onclick="resetForm()">
                        <i class="fas fa-plus"></i> Nuevo Estudiante
                    </button>
                </div>
                
                <div id="alertContainer"></div>
                
                <!-- Buscador -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-10">
                                <input type="text" id="searchInput" class="form-control" placeholder="Buscar por nombre, apellido o DNI...">
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-dark w-100" onclick="filterEstudiantes()">Buscar</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Tabla -->
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover" id="estudiantesTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Código</th>
                                        <th>Nombres</th>
                                        <th>Apellidos</th>
                                        <th>DNI</th>
                                        <th>Teléfono</th>
                                        <th>Nivel</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="estudiantesBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal Registrar/Editar -->
    <div class="modal fade" id="modalEstudiante" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="modalTitle">Nuevo Estudiante</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="estudianteForm">
                    <input type="hidden" id="estudianteId">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombres *</label>
                            <input type="text" id="nombres" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellidos *</label>
                            <input type="text" id="apellidos" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">DNI *</label>
                            <input type="text" id="dni" class="form-control" maxlength="8" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="telefono" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nivel</label>
                            <select id="nivel" class="form-select">
                                <option value="blanco">Blanco</option>
                                <option value="amarillo">Amarillo</option>
                                <option value="naranja">Naranja</option>
                                <option value="verde">Verde</option>
                                <option value="azul">Azul</option>
                                <option value="marrón">Marrón</option>
                                <option value="negro">Negro</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Estado</label>
                            <select id="estado" class="form-select">
                                <option value="activo">Activo</option>
                                <option value="inactivo">Inactivo</option>
                                <option value="moroso">Moroso</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-danger">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/estudiantes.js"></script>
    <script>
        if (!requireAdmin()) throw new Error('Acceso denegado');
        
        let currentFilter = '';
        
        function loadEstudiantes() {
            const estudiantes = getEstudiantes();
            let filtered = estudiantes;
            
            if (currentFilter) {
                filtered = estudiantes.filter(e => 
                    e.nombres.toLowerCase().includes(currentFilter) ||
                    e.apellidos.toLowerCase().includes(currentFilter) ||
                    e.dni.includes(currentFilter)
                );
            }
            
            const tbody = document.getElementById('estudiantesBody');
            tbody.innerHTML = filtered.map(e => `
                <tr>
                    <td>${e.codigo}</td>
                    <td>${e.nombres}</td>
                    <td>${e.apellidos}</td>
                    <td>${e.dni}</td>
                    <td>${e.telefono || '-'}</td>
                    <td><span class="badge bg-secondary">${getNombreNivel(e.nivel)}</span></td>
                    <td><span class="badge bg-${e.estado === 'activo' ? 'success' : (e.estado === 'moroso' ? 'warning' : 'secondary')}">${e.estado}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editEstudiante('${e.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-danger" onclick="deleteEstudiante('${e.id}')"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        
        function filterEstudiantes() {
            currentFilter = document.getElementById('searchInput').value.toLowerCase();
            loadEstudiantes();
        }
        
        function resetForm() {
            document.getElementById('estudianteId').value = '';
            document.getElementById('estudianteForm').reset();
            document.getElementById('modalTitle').innerText = 'Nuevo Estudiante';
        }
        
        function editEstudiante(id) {
            const estudiante = getEstudianteById(id);
            if (estudiante) {
                document.getElementById('estudianteId').value = estudiante.id;
                document.getElementById('nombres').value = estudiante.nombres;
                document.getElementById('apellidos').value = estudiante.apellidos;
                document.getElementById('dni').value = estudiante.dni;
                document.getElementById('telefono').value = estudiante.telefono || '';
                document.getElementById('email').value = estudiante.email || '';
                document.getElementById('nivel').value = estudiante.nivel;
                document.getElementById('estado').value = estudiante.estado;
                document.getElementById('modalTitle').innerText = 'Editar Estudiante';
                new bootstrap.Modal(document.getElementById('modalEstudiante')).show();
            }
        }
        
        function deleteEstudiante(id) {
            if (confirm('¿Eliminar este estudiante?')) {
                if (eliminarEstudiante(id)) {
                    showSuccess('Estudiante eliminado');
                    loadEstudiantes();
                } else {
                    showError('Error al eliminar');
                }
            }
        }
        
        document.getElementById('estudianteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('estudianteId').value;
            const data = {
                nombres: document.getElementById('nombres').value,
                apellidos: document.getElementById('apellidos').value,
                dni: document.getElementById('dni').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('email').value,
                nivel: document.getElementById('nivel').value,
                estado: document.getElementById('estado').value
            };
            
            let result;
            if (id) {
                result = actualizarEstudiante(id, data);
            } else {
                result = crearEstudiante(data);
            }
            
            if (result) {
                showSuccess(id ? 'Estudiante actualizado' : 'Estudiante registrado');
                bootstrap.Modal.getInstance(document.getElementById('modalEstudiante')).hide();
                loadEstudiantes();
                resetForm();
            } else {
                showError('Error al guardar');
            }
        });
        
        loadEstudiantes();
    </script>
</body>
</html>
