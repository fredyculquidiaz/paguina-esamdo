<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESAM-DO | Registrarse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
            min-height: 100vh;
        }
        .register-card {
            background: rgba(17,17,17,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #ff0000;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(255,0,0,0.2);
        }
        .form-control {
            background: rgba(26,26,26,0.9);
            border: 1px solid rgba(255,0,0,0.5);
            color: white;
        }
        .form-control:focus {
            border-color: #ff0000;
            box-shadow: 0 0 0 0.25rem rgba(255,0,0,0.25);
        }
        .form-label {
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="col-md-5">
            <div class="register-card">
                <div class="text-center mb-4">
                    <span class="bg-danger px-4 py-2 rounded d-inline-block fw-bold fs-3">ESAM-DO</span>
                    <h2 class="mt-3 text-white">Crear Cuenta</h2>
                </div>
                
                <div id="alertContainer"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="nombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" id="confirmPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2">Registrarse</button>
                </form>
                
                <hr class="my-4" style="border-color: rgba(255,0,0,0.3);">
                
                <div class="text-center">
                    <a href="login.html" class="text-danger">¿Ya tienes cuenta? Inicia Sesión</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertContainer');
            alertDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${message}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
            setTimeout(() => alertDiv.innerHTML = '', 3000);
        }
        
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showAlert('Las contraseñas no coinciden', 'danger');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) {
                showAlert('El correo ya está registrado', 'danger');
                return;
            }
            
            const newUser = { id: generateId(), nombre, email, password, rol: 'instructor' };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            showAlert('Registro exitoso. Ahora puedes iniciar sesión.', 'success');
            setTimeout(() => window.location.href = 'login.html', 2000);
        });
    </script>
</body>
</html>
